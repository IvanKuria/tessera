name: Tessera
options:
  bundleIdPrefix: app.tessera
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  KalshiKit:
    path: ../KalshiKit

targets:
  Tessera:
    type: application
    platform: macOS
    sources:
      - path: Sources
      - path: Resources
    dependencies:
      - package: KalshiKit
        product: KalshiKit
      # Embed the widget extension into Contents/PlugIns.
      - target: TesseraWidget
        embed: true
    info:
      path: Sources/Info.plist
      properties:
        # Standard windowed Mac app (Dock icon, opens to the main window).
        CFBundleDisplayName: Tessera
        CFBundleName: Tessera
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Unofficial app for Kalshi. Not affiliated with Kalshi / KalshiEX LLC."
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tessera.Tessera
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # App Group entitlement (shared cache with the widget) + notifications.
        CODE_SIGN_ENTITLEMENTS: Tessera.entitlements
        # App Groups + a signed widget extension require a real Apple Developer
        # team. Set DEVELOPMENT_TEAM to your 10-char Team ID; ad-hoc "-" signing
        # will NOT provision App Groups. Until then the app falls back to its
        # Application Support cache (see AppGroup.containerURL).
        DEVELOPMENT_TEAM: "6YNA9C4HJ6" # TODO: set your Apple Developer Team ID
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"

  TesseraWidget:
    type: app-extension
    platform: macOS
    sources:
      - path: WidgetSources
      # Share the App Group helper + snapshot models with the app (single
      # source of truth for the shared container + types).
      - path: Sources/Shared
    dependencies:
      - package: KalshiKit
        product: KalshiKit
    info:
      path: WidgetSources/Info.plist
      properties:
        CFBundleDisplayName: Tessera Odds
        CFBundleName: TesseraWidget
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        # Required for a WidgetKit extension; xcodegen generates this plist from
        # these properties, so it must live here (not hand-written in the file).
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.tessera.Tessera.TesseraWidget
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: NO
        SWIFT_VERSION: "6.0"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_ENTITLEMENTS: TesseraWidget.entitlements
        DEVELOPMENT_TEAM: "6YNA9C4HJ6" # TODO: set your Apple Developer Team ID (same as app)
        CODE_SIGN_STYLE: Automatic
        CODE_SIGN_IDENTITY: "Apple Development"
